apiVersion: v1
kind: Service
metadata:
  name: fastapi-app-service
spec:
  type: LoadBalancer # Exposes the service externally using a cloud provider load balancer
  selector:
    app: fastapi-app
  ports:
    - protocol: TCP
      port: 80        # Public port accessible by users outside the cluster
      targetPort: 8000 # Internal target port where FastAPI application runs inside the container